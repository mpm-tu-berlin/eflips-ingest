name: Unit Tests
on: pull_request

env:
  POETRY_URL: https://install.python-poetry.org

jobs:
  # Label
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        PYTHON_VERSION: [ "3.10", "3.11", "3.12", "3.13" ]
        DATABASE: [ "postgres", "sqlite" ]
    services:
      postgres:
        image: postgis/postgis
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: database
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432

    steps:
      # Downloads a copy of the code in your repository before running CI tests
      - name: Check out code
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Enable btree_gist postgre extension
        if: matrix.DATABASE == 'postgres'
        run: |
          psql postgres://user:password@localhost/database -c "CREATE EXTENSION btree_gist;"
      # SQLite/SpatiaLite specific setup
      - name: Install SpatiaLite
        if: matrix.DATABASE == 'sqlite'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-mod-spatialite
      - name: Set up Python ${{ matrix.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}
      - name: Install poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install Dependencies
        run: |
          poetry install --no-root
      - name: Run Tests
        run:
          poetry run pytest
        env:
          DATABASE_URL: ${{ matrix.DATABASE == 'postgres' && 'postgresql://user:password@localhost/database' || 'sqlite:///./test_database.db' }}
          SPATIALITE_LIBRARY_PATH: "/usr/lib/x86_64-linux-gnu/mod_spatialite.so"
          ELEVATION_DUMMY_MODE: "True"
          PYTHONPATH: ${{ github.workspace }}


